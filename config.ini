[audio]
# Master volume (0.0 - 1.0)
master_volume = 0.5

# Music volume (0.0 - 1.0)
music_volume = 0.6

# Tempo range (BPM)
min_bpm = 100
max_bpm = 130

# Track volumes (0.0 - 1.0)
bass_volume = 0.8
melody_volume = 0.7
highs_volume = 0.65

# Enable/disable tracks
bass_enabled = true
melody_enabled = true
highs_enabled = true

# Highs configuration
highs_octave_offset = 12
highs_note_density = 2

# Evolution settings (bars between mutations)
evolution_min_bars = 2
evolution_max_bars = 4
mutation_chance = 0.5

[graphics]
# Placeholder for future graphics settings
fullscreen = false
vsync = true

[gameplay]
# Placeholder for future gameplay settings
difficulty = normal

[ollama]
# Ollama server settings (supports local or remote instances)
host = localhost
port = 11434
model = qwen2.5:7b
# Optional API key for authenticated remote instances
api_key =
# Request timeout in seconds (7B models need longer)
timeout = 120
# Enable/disable Ollama features
enabled = true
